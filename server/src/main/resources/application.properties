spring.application.name=server
server.port=9090
spring.config.import=optional:file:.env[.properties],optional:file:.env.example[.properties]

# MySQL Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/Contify?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# CORS & Web Configuration
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:contify-jwt-secret-key-change-this-in-production-1234567890}
app.jwt.expiration-ms=86400000

# Cloudinary Configuration (for file uploads)
# Get your credentials from https://cloudinary.com
# IMPORTANT: These values MUST be set for file uploads to work
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.streaming-profile=full_hd
app.cloudinary.url-expiration-seconds=900

# Kafka Configuration
app.kafka.enabled=${KAFKA_ENABLED:false}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
app.kafka.task-topic=${KAFKA_TASK_TOPIC:contify.task-events}
